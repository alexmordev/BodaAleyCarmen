name: Build & Deploy (Hostinger)

# En cada push a main: compila el proyecto y publica el resultado YA construido
# en la rama `production` (archivos en la raiz). Hostinger se conecta a esa rama
# y clona su contenido en public_html, sirviendo el sitio estatico tal cual.
# (Hostinger no compila: solo sirve archivos.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hostinger-build
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish dist to production branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: production
          publish_dir: ./dist
          # La rama production contiene SOLO los archivos construidos en su raiz.
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
