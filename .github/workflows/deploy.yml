name: Build & Deploy (Hostinger)

# En cada push a main: recompila el proyecto y deja el resultado YA construido
# dentro de public_html, que es la carpeta que sirve la conexion git de Hostinger.
# (Hostinger no compila: solo sirve los archivos estaticos que encuentra.)
on:
  push:
    branches: [main]
    # Evita un bucle: los commits que solo tocan public_html (los que hace este
    # propio workflow) no vuelven a dispararlo.
    paths-ignore:
      - 'public_html/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hostinger-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit public_html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public_html
          if git diff --staged --quiet; then
            echo "public_html sin cambios"
          else
            git commit -m "build: actualizar public_html [skip ci]"
            git push
          fi
