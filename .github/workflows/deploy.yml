name: Build (Next.js)

# Next.js como app Node (SSR + futuras API routes para el RSVP).
#
# El DESPLIEGUE lo hace Hostinger directamente desde su integración Git: clona el
# repo, ejecuta `npm install` + `npm run build` y sirve la app con `npm run start`
# (runtime Node). Por eso este workflow NO publica ninguna rama: solo valida que
# `next build` compila en cada push, para no romper el deploy de Hostinger.
on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: nextjs-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
